apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: debezium
  labels:
    app: debezium
spec:
  serviceName: debezium
  replicas: 1
  selector:
    matchLabels:
      app: debezium
  template:
    metadata:
      labels:
        app: debezium
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka port 9092..."
              until nc -z kafka 9092 2>/dev/null; do
                sleep 3
              done
              echo "Kafka is ready!"
      containers:
        - name: debezium
          image: quay.io/debezium/connect:2.7.4.Final
          ports:
            - containerPort: 8083
          env:
            - name: BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: GROUP_ID
              value: "1"
            - name: CONFIG_STORAGE_TOPIC
              value: debezium_configs
            - name: OFFSET_STORAGE_TOPIC
              value: debezium_offsets
            - name: STATUS_STORAGE_TOPIC
              value: debezium_statuses
            - name: KEY_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: KEY_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: KAFKA_HEAP_OPTS
              value: "-Xms128M -Xmx512M"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /connectors
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /connectors
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: debezium
  labels:
    app: debezium
spec:
  clusterIP: None
  ports:
    - name: "8083"
      port: 8083
      protocol: TCP
      targetPort: 8083
  selector:
    app: debezium